<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Petrofuel Dispatch Mobile application.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Petrofuel">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Petrofuel</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #f8fafc; /* Light gray background */
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #loading-container {
      text-align: center;
      color: #0f172a; /* Dark text color */
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(15, 23, 42, 0.1);
      border-radius: 50%;
      border-top-color: #3b82f6; /* Blue spinner */
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #status-text {
      font-size: 16px;
      font-weight: 500;
      color: #475569; /* Slate gray text */
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="loading-container">
    <div class="spinner"></div>
    <div id="status-text">Memuat aplikasi...</div>
  </div>

  <script>
    const statusText = document.getElementById('status-text');
    let isUpdating = false;

    // Push a dummy history state to prevent PWA from closing on back swipe
    if (window.history.state === null || !window.history.state.pwa_init) {
      window.history.pushState({ pwa_init: true }, '', window.location.href);
    }

    // Listen for controller change (new worker takes control)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }

    async function checkVersionAndBoot() {
      try {
        const storedVersion = localStorage.getItem('app_version');
        const response = await fetch('version.json?t=' + Date.now());
        if (response.ok) {
          const serverData = await response.json();
          const serverVersion = serverData.version + '+' + serverData.build_number;

          if (storedVersion && storedVersion !== serverVersion) {
            isUpdating = true;
            statusText.textContent = 'Memperbarui ke versi terbaru...';
            localStorage.setItem('app_version', serverVersion);

            if ('serviceWorker' in navigator) {
              const registration = await navigator.serviceWorker.getRegistration();
              if (registration) {
                // Force check for updates
                registration.update();
                
                // If a worker is already waiting in background, activate it
                if (registration.waiting) {
                  registration.waiting.postMessage({ action: 'skipWaiting' });
                }
                
                // Watch for newly found install workers
                registration.addEventListener('updatefound', () => {
                  const installingWorker = registration.installing;
                  if (installingWorker) {
                    installingWorker.addEventListener('statechange', () => {
                      if (installingWorker.state === 'installed') {
                        installingWorker.postMessage({ action: 'skipWaiting' });
                      }
                    });
                  }
                });
              }
            }

            // Safety fallback: reload page after 6 seconds if update gets stuck
            setTimeout(() => {
              window.location.reload();
            }, 6000);
            return;
          } else if (!storedVersion) {
            localStorage.setItem('app_version', serverVersion);
          }
        }
      } catch (e) {
        console.log('Version check skipped (offline or error):', e);
      }

      // No update found or offline, boot normally
      loadFlutter();
    }

    function loadFlutter() {
      if (isUpdating) return;
      const container = document.getElementById('loading-container');
      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      script.onload = () => {
        if (container) {
          container.style.opacity = 0;
          setTimeout(() => container.remove(), 500);
        }
      };
      document.body.appendChild(script);
    }

    // Execute check
    checkVersionAndBoot();
  </script>
</body>
</html>
